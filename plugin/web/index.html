<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Topics - the Topic Visualizer</title>
<link rel="stylesheet" href="topics.css" />
</head>
<body>
<header>
  <h1>&#127756; Topics <span class="dim">- one tree, three ways</span></h1>
  <div class="viewtabs" id="viewtabs">
    <button data-v="constellation">Constellation</button>
    <button data-v="lineage">Lineage</button>
    <button data-v="starchart">Star Chart</button>
  </div>
  <input id="search" class="seambox" type="text" placeholder="search topics... (Esc clears)"
         title="text search + facet words: critical, seedling, open, discussed, pruned, archived - combine them, e.g. 'critical grounding'" />
  <input id="quickadd" class="seambox" type="text" placeholder="+ quick add (Enter; child of selection)" />
  <label class="archchip" title="show pruned + expired topics as ghosts (everything is resurrectable)">
    <input id="archive" type="checkbox" /> archive</label>
  <button id="bgopen" class="seambox" title="choose a backdrop" style="display:none">&#9673; backdrop</button>
  <span class="hud"><b id="stat"></b><span id="hint" class="dim"></span></span>
</header>
<div id="legend" class="legend"></div>
<div id="seamhealth" class="seamhealth"></div>
<main>
  <div id="stage" class="stage"><div id="bgimage"></div><canvas id="stars"></canvas><div id="renderer"></div></div>
  <div id="panel"></div>
</main>
<div id="confirm"><div class="box" id="confirmBox"></div></div>
<div id="bgmodal"><div class="bgpanel">
  <div class="bghead"><b>Backdrop</b><span class="dim">pick a scene, or the generated default</span>
    <button class="bgclose" title="close (Esc)">&times;</button></div>
  <div class="bggrid" id="bggrid"></div>
</div></div>

<script src="topics-core.js"></script>
<script src="adapter-sqlite.js"></script>
<script src="render-constellation.js"></script>
<script src="render-lineage.js"></script>
<script src="render-starchart.js"></script>
<script src="topics-shell.js"></script>
</body>
</html>
