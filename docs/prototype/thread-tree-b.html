<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Thread Tree - B: Lineage</title>
<style>
  :root { --bg:#05070f; --panel:#10162a; --line:#2a3558; --ink:#dfe7ff; --dim:#7d8ab0;
          --accent:#6ea8ff; --warn:#f0b24a; --danger:#f85149; }
  * { box-sizing: border-box; margin: 0; }
  body { color: var(--ink); font: 14px/1.5 system-ui, sans-serif;
         overflow: hidden; height: 100vh; display: flex;
         background: radial-gradient(ellipse 120% 90% at 30% 10%, #101a3a 0%, #070b1a 45%, #04060d 100%); }
  #stage { flex: 1 1 auto; overflow: hidden; position: relative; cursor: grab; }
  #stage.dragging { cursor: grabbing; }
  #stars { position: absolute; inset: 0; pointer-events: none; }
  #world { position: absolute; transform-origin: 0 0; }
  #wires { position: absolute; overflow: visible; pointer-events: none; }
  .wire { stroke: #7f9dff; stroke-opacity: 0.3; stroke-width: 1.4; fill: none; }
  .tnode { position: absolute; width: 220px; border-radius: 10px; padding: 8px 10px;
           cursor: pointer; user-select: none;
           background: linear-gradient(160deg, #141c36ee, #0b101fee);
           border: 1px solid #3a4a7a; box-shadow: 0 0 14px #4b6cff22, inset 0 0 20px #4b6cff0d;
           transition: transform 0.12s ease, box-shadow 0.12s ease; }
  .tnode:hover { transform: translateY(-2px); box-shadow: 0 4px 22px #6ea8ff44; }
  .tnode.root { border-color: #a8842f; box-shadow: 0 0 18px #f0b24a2e, inset 0 0 20px #f0b24a12; }
  .tnode.selected { border-color: #cfe0ff; box-shadow: 0 0 20px #6ea8ff55; }
  /* STATE LANGUAGE (owner round 3): frontier leaves get a crisp cyan edge (the deepest layer);
     critical topics pulse (the AI points HERE); discussed topics dim to embers (reopenable). */
  .tnode.leaf { border-style: solid; border-color: #7fd4ff; border-left-width: 3px;
                box-shadow: 0 0 12px #7fd4ff2a, inset 0 0 20px #7fd4ff0d; }
  .tnode.discussed { opacity: 0.4; border-color: #4a4f66; box-shadow: none; }
  .tnode.critical { animation: pulse 1.8s ease-in-out infinite; border-color: #ff9a4a; }
  @keyframes pulse { 0%, 100% { box-shadow: 0 0 10px #ff9a4a44; }
                     50% { box-shadow: 0 0 26px #ff9a4abb; } }
  .chip.frontier { color: #7fd4ff; border-color: #2e5a75; }
  .chip.crit { color: #ff9a4a; border-color: #7a4a2e; }
  .chip.done { color: #9aa2bd; }
  .tnode .sum { font-size: 12px; line-height: 1.35; }
  .tnode .chips { margin-top: 5px; display: flex; gap: 6px; align-items: center; }
  .chip { font-size: 10px; color: var(--dim); border: 1px solid var(--line);
          border-radius: 999px; padding: 1px 7px; }
  .chip.kids { color: var(--accent); }
  .caret { position: absolute; right: -13px; top: 50%; transform: translateY(-50%);
           width: 22px; height: 22px; border-radius: 50%; background: var(--bg);
           border: 1px solid var(--line); color: var(--dim); font-size: 11px;
           display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .caret:hover { color: var(--ink); border-color: var(--accent); }
  #hud { position: absolute; top: 12px; left: 14px; color: var(--dim); font-size: 12px;
         background: #0d1117cc; padding: 8px 12px; border: 1px solid var(--line);
         border-radius: 8px; z-index: 5; }
  #hud b { color: var(--ink); }
  #panel { width: 380px; flex-shrink: 0; background: var(--panel);
           border-left: 1px solid var(--line); padding: 18px; overflow-y: auto; display: none; }
  #panel.open { display: block; }
  #panel h2 { font-size: 15px; line-height: 1.35; margin-bottom: 8px; }
  #panel .meta { color: var(--dim); font-size: 12px; margin-bottom: 12px; }
  #panel .body { white-space: pre-wrap; font-size: 13px; margin-bottom: 16px; }
  #panel button { background: none; border: 1px solid var(--line); color: var(--ink);
                  border-radius: 6px; padding: 6px 14px; cursor: pointer; margin-right: 8px; }
  #panel button.prune { border-color: var(--danger); color: var(--danger); }
  #panel button:hover { background: #ffffff11; }
  #confirm { position: fixed; inset: 0; background: #000a; display: none;
             align-items: center; justify-content: center; z-index: 10; }
  #confirm.open { display: flex; }
  #confirm .box { background: var(--panel); border: 1px solid var(--warn);
                  border-radius: 10px; padding: 22px; max-width: 440px; }
  #confirm .box h3 { margin-bottom: 10px; font-size: 15px; }
  #confirm .box p { color: var(--dim); font-size: 13px; margin-bottom: 16px; }
</style>
</head>
<body>
<div id="stage">
  <div id="hud">Variant B - <b>Lineage</b> (collapsible tree) | drag = pan, wheel = zoom,
    circle = expand/collapse, card = detail | <b id="stat"></b><br/>
    <span style="color:#f0b24a">&#9632;</span> root &nbsp;
    <span style="color:#6ea8ff">&#9632;</span> open &nbsp;
    <span style="color:#7fd4ff">&#9632;</span> frontier leaf &nbsp;
    <span style="color:#ff9a4a">&#9632;</span> critical &nbsp;
    <span style="color:#5a5f75">&#9632;</span> discussed (reopenable)</div>
  <canvas id="stars"></canvas>
  <div id="world"><svg id="wires"></svg><div id="cards"></div></div>
</div>
<div id="panel"></div>
<div id="confirm"><div class="box" id="confirmBox"></div></div>
<script>
(() => {
  const PARAMS = new URLSearchParams(location.search);
  const PROJECT = PARAMS.get("project") || "demo";
  const DEMO = PARAMS.get("demo");
  const W = 220, GX = 80, GY = 18, ROWH = 74;
  let nodes = [], bySlug = {}, roots = [], selected = null;

  const short = t => t.replace(/^OPEN THREAD:\s*/i, "").replace(/\s*\([^)]*\)\s*$/, "");
  const weight = t => (t.match(/\(([^)]*)\)\s*$/) || [])[1] || "";
  const subtree = n => { const out = [n]; n.children.forEach(c => out.push(...subtree(c))); return out; };

  // demo mode (?demo=N): the SAME deterministic synthetic topic space as variant A (same seed),
  // so both variants render the identical tree for a fair scale comparison. Mega-fanout root,
  // two 12-deep chains, organic preferential growth.
  function demoData(count) {
    let s = 42 >>> 0;
    const rnd = () => (s = (s * 1664525 + 1013904223) >>> 0) / 4294967296;
    const pick = a => a[Math.floor(rnd() * a.length)];
    const AREAS = ["auth", "the API", "onboarding", "billing", "the dashboard", "search",
      "notifications", "the data model", "caching", "the CLI", "permissions", "logging",
      "the mobile app", "analytics", "deploys", "the docs", "rate limiting", "the queue",
      "settings", "the changelog"];
    const ASPECTS = ["pacing", "curation", "token cost", "visual design", "calibration",
      "drift", "coverage", "tooling", "doctrine", "automation", "metrics", "workflow",
      "onboarding", "pruning", "search", "export", "grounding", "voice", "continuity", "scale"];
    const FORMS = [t => `should ${t} fan out or stay flat?`, t => `what does ${t} cost at scale?`,
      t => `who owns ${t}?`, t => `is ${t} a stage or an inspector?`,
      t => `when does ${t} graduate to canon?`, t => `does ${t} need its own instrument?`,
      t => `${t}: build now or trigger later?`, t => `how do we measure ${t}?`];
    const WEIGHTS = ["~10 min", "~20 min", "~30 min", "~1 hour", "errand", "deep dive"];
    const out = [];
    const mk = (parent) => {
      const area = pick(AREAS), q = pick(FORMS)(pick(ASPECTS));
      const critical = rnd() < 0.10, state = (!critical && rnd() < 0.22) ? "discussed" : "open";
      const n = { slug: `demo-${out.length}`,
        title: `OPEN THREAD: ${area}: ${q} (${pick(WEIGHTS)})`,
        body: `Synthetic stress-test thread (demo mode, not on the board).${critical ? "\npriority: critical" : ""}\n\nTopic space: ${area}.\nTHE QUESTION: ${q}`,
        author: "demo", created: "2026-07-11", parent, children: [], open: true,
        state, critical,
        x: 0, y: 0 };
      out.push(n); return n;
    };
    const rootCount = 8 + Math.floor(rnd() * 6), rootsArr = [];
    for (let i = 0; i < rootCount; i++) rootsArr.push(mk(null));
    for (let i = 0; i < 35 && out.length < count; i++) mk(rootsArr[0].slug);   // mega fanout
    for (let c = 1; c <= 2; c++) {                                             // two deep chains
      let p = rootsArr[c];
      for (let d = 0; d < 12 && out.length < count; d++) p = mk(p.slug);
    }
    while (out.length < count) mk(out[Math.floor(rnd() * out.length)].slug);   // organic growth
    return out;
  }

  async function load() {
    let raw;
    if (DEMO) {
      raw = demoData(Math.min(1500, parseInt(DEMO, 10) || 300));
    } else {
      // fetch ALL states (owner round 3): discussed topics stay VISIBLE as progress -
      // only pruned (discarded) topics leave the map
      const r = await fetch(`/api/posts?project=${PROJECT}`);
      const items = (await r.json()).items || [];
      raw = items.filter(p => /^OPEN THREAD/i.test(p.title || ""))
        .filter(p => (p.resolve_kind || "") !== "discarded")
        .map(p => {
          const m = (p.body || "").match(/^parent:\s*([a-z0-9-]+)/mi);
          return { slug: p.slug, title: p.title, body: p.body, author: p.author,
                   created: p.created, parent: m ? m[1] : null, children: [], open: true,
                   state: String(p.status || "open") === "open" ? "open" : "discussed",
                   critical: /^priority:\s*critical/mi.test(p.body || ""),
                   x: 0, y: 0 };
        });
    }
    bySlug = {}; nodes = raw;
    nodes.forEach(n => { n.children = []; bySlug[n.slug] = n; });
    nodes.forEach(n => { if (n.parent && bySlug[n.parent]) bySlug[n.parent].children.push(n);
                         else n.parent = null; });
    roots = nodes.filter(n => !n.parent);
    // FAMILY HUES (color-by-group): each root lineage tints its cards' leading edge
    roots.forEach((root, i) => {
      const hue = Math.round(i * 137.5) % 360;
      (function tint(n) { n.hue = hue; n.children.forEach(tint); })(root);
    });
    document.getElementById("stat").textContent =
      `${nodes.length} open thread(s), ${roots.length} root(s)${DEMO ? " (demo)" : ""}`;
    render();
  }

  // --- tidy layout: depth -> x; visible leaves stack in y; parents center on children ---
  function layout() {
    let cursor = 0;
    const walk = (n, depth) => {
      n.x = 40 + depth * (W + GX);
      const kids = n.open ? n.children : [];
      if (!kids.length) { n.y = 40 + cursor; cursor += ROWH + GY; return; }
      kids.forEach(k => walk(k, depth + 1));
      n.y = kids.reduce((s, k) => s + k.y, 0) / kids.length;
    };
    roots.forEach(r => walk(r, 0));
  }

  const cards = document.getElementById("cards"), wires = document.getElementById("wires");
  function render() {
    layout();
    cards.innerHTML = ""; wires.innerHTML = "";
    const visible = [];
    const collect = n => { visible.push(n); if (n.open) n.children.forEach(collect); };
    roots.forEach(collect);
    let maxX = 0, maxY = 0;
    for (const n of visible) {
      maxX = Math.max(maxX, n.x + W + 60); maxY = Math.max(maxY, n.y + ROWH + 60);
      const d = document.createElement("div");
      d.className = "tnode" + (n.parent ? "" : " root") + (selected === n ? " selected" : "")
        + (!n.children.length ? " leaf" : "")
        + (n.state === "discussed" ? " discussed" : "")
        + (n.critical && n.state !== "discussed" ? " critical" : "");
      d.style.left = n.x + "px"; d.style.top = n.y + "px";
      if (n.parent && n.state !== "discussed") {
        d.style.borderLeft = `3px solid hsl(${(222 + (n.hue || 0)) % 360}, 70%, 62%)`;
      }
      const s = short(n.title);
      d.innerHTML = `<div class="sum">${s.slice(0, 72)}${s.length > 72 ? "..." : ""}</div>
        <div class="chips">${weight(n.title) ? `<span class="chip">${weight(n.title)}</span>` : ""}
          ${n.children.length ? `<span class="chip kids">${n.children.length} child(ren)</span>` : `<span class="chip frontier">frontier</span>`}
          ${n.critical ? `<span class="chip crit">critical</span>` : ""}
          ${n.state === "discussed" ? `<span class="chip done">discussed</span>` : ""}
        </div>
        ${n.children.length ? `<div class="caret">${n.open ? "-" : "+"}</div>` : ""}`;
      d.addEventListener("click", ev => {
        if (ev.target.classList.contains("caret")) { n.open = !n.open; render(); return; }
        select(n);
      });
      cards.appendChild(d);
      if (n.parent) {
        const p = bySlug[n.parent];
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        const x1 = p.x + W, y1 = p.y + ROWH / 2 - 6, x2 = n.x, y2 = n.y + ROWH / 2 - 6,
              mx = (x1 + x2) / 2;
        path.setAttribute("d", `M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`);
        path.setAttribute("class", "wire");
        wires.appendChild(path);
      }
    }
    wires.setAttribute("width", maxX); wires.setAttribute("height", maxY);
    wires.style.width = maxX + "px"; wires.style.height = maxY + "px";
  }

  // --- pan/zoom ---
  const stage = document.getElementById("stage"), world = document.getElementById("world");
  let tx = 20, ty = 20, scale = 1;
  const apply = () => world.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  stage.addEventListener("mousedown", ev => {
    if (ev.target.closest(".tnode")) return;
    stage.classList.add("dragging");
    const sx = ev.clientX - tx, sy = ev.clientY - ty;
    const mv = e => { tx = e.clientX - sx; ty = e.clientY - sy; apply(); };
    const up = () => { stage.classList.remove("dragging");
      removeEventListener("mousemove", mv); removeEventListener("mouseup", up); };
    addEventListener("mousemove", mv); addEventListener("mouseup", up);
  });
  // zoom anchored to the CURSOR (owner: origin-anchored zoom made B "nearly unusable" - keep
  // the world point under the mouse fixed while scale changes)
  stage.addEventListener("wheel", ev => { ev.preventDefault();
    const rect = stage.getBoundingClientRect();
    const mx = ev.clientX - rect.left, my = ev.clientY - rect.top;
    const next = Math.max(0.3, Math.min(2.5, scale * (ev.deltaY < 0 ? 1.12 : 0.9)));
    tx = mx - (mx - tx) * (next / scale);
    ty = my - (my - ty) * (next / scale);
    scale = next; apply(); },
    { passive: false });

  // --- detail + state actions ---
  const HDRS = { "Content-Type": "application/json", "X-Requested-By": "thread-tree" };
  const panel = document.getElementById("panel");
  function select(n) {
    selected = n; render();
    const kids = subtree(n).length - 1;
    panel.className = "open";
    const stateChip = n.state === "discussed" ? " | DISCUSSED" : (n.critical ? " | CRITICAL" : "");
    panel.innerHTML = `<h2>${short(n.title)}</h2>
      <div class="meta">${weight(n.title) || "no time-weight"} | by ${n.author} | ${String(n.created).slice(0, 10)}
        | ${n.children.length} child(ren), ${kids} descendant(s)${stateChip}<br/>slug: ${n.slug}</div>
      <div class="body"></div>
      ${n.state === "discussed"
        ? `<button class="reopen">Reopen topic</button>`
        : `<button class="discuss">Mark discussed</button>`}
      <button class="prune">Prune this branch</button>
      <button class="close">Close</button>`;
    panel.querySelector(".body").textContent =
      (n.body || "").replace(/^parent:.*$/mi, "").replace(/^priority:.*$/mi, "").trim();
    panel.querySelector(".close").onclick = () => { panel.className = ""; selected = null; render(); };
    panel.querySelector(".prune").onclick = () => confirmPrune(n);
    const reopenBtn = panel.querySelector(".reopen");
    if (reopenBtn) reopenBtn.onclick = async () => {
      if (!DEMO) await fetch("/api/reopen", { method: "POST", headers: HDRS,
        body: JSON.stringify({ slug: n.slug, author: "you" }) });
      n.state = "open"; panel.className = ""; selected = null; render();
    };
    const discussBtn = panel.querySelector(".discuss");
    if (discussBtn) discussBtn.onclick = async () => {
      if (!DEMO) await fetch("/api/post/resolve", { method: "POST", headers: HDRS,
        body: JSON.stringify({ slug: n.slug, author: "you", kind: "completed",
                               note: "discussed - marked via the thread tree" }) });
      n.state = "discussed"; panel.className = ""; selected = null; render();
    };
  }
  function confirmPrune(n) {
    const all = subtree(n), box = document.getElementById("confirmBox"),
          modal = document.getElementById("confirm");
    box.innerHTML = `<h3>Prune "${short(n.title).slice(0, 60)}"?</h3>
      <p>This resolves <b>${all.length} thread(s)</b> (this node + ${all.length - 1} descendant(s)).
      Reversible: yes - any thread can be reopened on the board.</p>
      <button class="go" style="border:1px solid var(--danger);color:var(--danger);background:none;border-radius:6px;padding:6px 14px;cursor:pointer;margin-right:8px;">Prune ${all.length}</button>
      <button class="no" style="border:1px solid var(--line);color:var(--ink);background:none;border-radius:6px;padding:6px 14px;cursor:pointer;">Cancel</button>`;
    modal.className = "open";
    box.querySelector(".no").onclick = () => modal.className = "";
    box.querySelector(".go").onclick = async () => {
      if (DEMO) {
        const gone = new Set(all.map(t => t.slug));
        nodes = nodes.filter(t => !gone.has(t.slug));
        nodes.forEach(t => t.children = t.children.filter(c => !gone.has(c.slug)));
        roots = nodes.filter(t => !t.parent);
        modal.className = ""; panel.className = ""; selected = null;
        document.getElementById("stat").textContent =
          `${nodes.length} open thread(s) (demo)`;
        render();
        return;
      }
      for (const t of all) await fetch("/api/post/resolve", {
        method: "POST", headers: HDRS,
        body: JSON.stringify({ slug: t.slug, author: "you", kind: "discarded",
                               note: "pruned from the thread tree by the owner" }) });
      modal.className = ""; panel.className = ""; selected = null; load();
    };
  }

  // starfield backdrop (painted once; repainted on resize)
  function paintStars() {
    const c = document.getElementById("stars"), r = stage.getBoundingClientRect();
    c.width = r.width; c.height = r.height;
    const ctx = c.getContext("2d");
    let s = 7 >>> 0; const rnd = () => (s = (s * 1664525 + 1013904223) >>> 0) / 4294967296;
    for (let i = 0; i < 240; i++) {
      const x = rnd() * c.width, y = rnd() * c.height, big = rnd() > 0.94;
      ctx.globalAlpha = big ? 0.8 : 0.15 + rnd() * 0.35;
      ctx.fillStyle = big ? "#cfe0ff" : "#8fa5d8";
      ctx.beginPath(); ctx.arc(x, y, big ? 1.4 : 0.7, 0, 7); ctx.fill();
    }
  }
  addEventListener("resize", paintStars);

  paintStars(); apply(); load();
})();
</script>
</body>
</html>
