<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Thread Tree - C: Star Chart</title>
<style>
  :root { --bg:#05070f; --panel:#10162a; --line:#2a3558; --ink:#dfe7ff; --dim:#7d8ab0;
          --accent:#6ea8ff; --warn:#f0b24a; --danger:#f85149; }
  * { box-sizing: border-box; margin: 0; }
  body { color: var(--ink); font: 14px/1.5 system-ui, sans-serif;
         overflow: hidden; height: 100vh; display: flex;
         background: radial-gradient(ellipse 120% 90% at 50% 0%, #101a3a 0%, #070b1a 45%, #04060d 100%); }
  #stage { flex: 1 1 auto; cursor: grab; position: relative; }
  #stage.dragging { cursor: grabbing; }
  #stars { position: absolute; inset: 0; pointer-events: none; }
  svg { width: 100%; height: 100%; display: block; position: relative; }
  .orbit { fill: none; stroke: #7f9dff; stroke-opacity: 0.08; stroke-width: 1; }
  .edge { stroke: #7f9dff; stroke-opacity: 0.3; stroke-width: 1.2; fill: none; }
  .fog { pointer-events: none; }
  .twinkle { position: absolute; width: 3px; height: 3px; border-radius: 50%;
             background: #cfe0ff; pointer-events: none;
             animation: tw 3.2s ease-in-out infinite; }
  @keyframes tw { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.9; } }
  .node { cursor: pointer; }
  .node circle.core { fill: url(#starGrad); stroke: none; }
  .node.focus circle.core { fill: url(#sunGrad); }
  .node.rootlike circle.core { fill: url(#sunGrad); }
  .node.selected circle.core { stroke: #cfe0ff; stroke-width: 1.5; }
  .node circle.halo { fill: none; stroke: #f0b24a; stroke-opacity: 0.6;
                      stroke-dasharray: 3 4; stroke-width: 1.3; }
  /* STATE LANGUAGE (owner round 3): frontier leaves = crisp sparkles (the deepest layer);
     critical = pulsing beacon (the AI points HERE); discussed = dim ember (reopenable). */
  .node path.leafstar { fill: #d9f2ff; stroke: none; }
  .node.selected path.leafstar { stroke: #cfe0ff; stroke-width: 1.5; }
  .node.discussed circle.core, .node.discussed path.leafstar { opacity: 0.28; }
  .node.discussed text { opacity: 0.45; }
  .node circle.beacon { fill: none; stroke: #ff9a4a; stroke-width: 2; pointer-events: none; }
  .node text { fill: #c3cff2; font-size: 11px; pointer-events: none;
               paint-order: stroke; stroke: #05070f; stroke-width: 3px; }
  .node text.tiny { font-size: 9px; fill: #8fa0cc; }
  .node text.more { fill: #f0b24a; font-size: 9px; }
  #hud { position: absolute; top: 12px; left: 14px; color: var(--dim); font-size: 12px;
         background: #05070fcc; padding: 8px 12px; border: 1px solid var(--line);
         border-radius: 8px; z-index: 5; max-width: 70%; }
  #hud b { color: var(--ink); }
  #crumbs { margin-top: 4px; }
  #crumbs span { color: var(--accent); cursor: pointer; }
  #crumbs span:hover { text-decoration: underline; }
  #crumbs .sep { color: var(--dim); cursor: default; }
  #crumbs .here { color: var(--warn); cursor: default; }
  #panel { width: 380px; flex-shrink: 0; background: var(--panel);
           border-left: 1px solid var(--line); padding: 18px; overflow-y: auto; display: none; }
  #panel.open { display: block; }
  #panel h2 { font-size: 15px; line-height: 1.35; margin-bottom: 8px; }
  #panel .meta { color: var(--dim); font-size: 12px; margin-bottom: 12px; }
  #panel .body { white-space: pre-wrap; font-size: 13px; margin-bottom: 16px; }
  #panel button { background: none; border: 1px solid var(--line); color: var(--ink);
                  border-radius: 6px; padding: 6px 14px; cursor: pointer;
                  margin: 0 8px 8px 0; }
  #panel button.prune { border-color: var(--danger); color: var(--danger); }
  #panel button.focusbtn { border-color: var(--warn); color: var(--warn); }
  #panel button:hover { background: #ffffff11; }
  #confirm { position: fixed; inset: 0; background: #000a; display: none;
             align-items: center; justify-content: center; z-index: 10; }
  #confirm.open { display: flex; }
  #confirm .box { background: var(--panel); border: 1px solid var(--warn);
                  border-radius: 10px; padding: 22px; max-width: 440px; }
  #confirm .box h3 { margin-bottom: 10px; font-size: 15px; }
  #confirm .box p { color: var(--dim); font-size: 13px; margin-bottom: 16px; }
</style>
</head>
<body>
<div id="stage">
  <div id="hud">Variant C - <b>Star Chart</b> (radial focus+context) | click = detail,
    Focus button or double-click = re-center, drag = pan, wheel = zoom | <b id="stat"></b><br/>
    <span style="color:#f0b24a">&#9679;</span> sun/root &nbsp;
    <span style="color:#7fa7ff">&#9679;</span> open &nbsp;
    <span style="color:#d9f2ff">&#10022;</span> frontier leaf &nbsp;
    <span style="color:#ff9a4a">&#9678;</span> critical &nbsp;
    <span style="color:#5a5f75">&#9679;</span> discussed &nbsp;
    <span style="color:#f0b24a">&#9676;</span> +N deeper
    <div id="crumbs"></div>
  </div>
  <canvas id="stars"></canvas>
  <svg id="svg">
    <defs>
      <radialGradient id="starGrad">
        <stop offset="0%" stop-color="#eaf2ff" />
        <stop offset="35%" stop-color="#7fa7ff" />
        <stop offset="75%" stop-color="#3a5bbf" stop-opacity="0.55" />
        <stop offset="100%" stop-color="#3a5bbf" stop-opacity="0" />
      </radialGradient>
      <radialGradient id="sunGrad">
        <stop offset="0%" stop-color="#fff6dd" />
        <stop offset="35%" stop-color="#ffcf6e" />
        <stop offset="75%" stop-color="#c98a2e" stop-opacity="0.6" />
        <stop offset="100%" stop-color="#c98a2e" stop-opacity="0" />
      </radialGradient>
      <radialGradient id="fogGrad">
        <stop offset="0%" stop-color="#5b7fe0" stop-opacity="0.35" />
        <stop offset="60%" stop-color="#4160b8" stop-opacity="0.12" />
        <stop offset="100%" stop-color="#4160b8" stop-opacity="0" />
      </radialGradient>
    </defs>
    <g id="view"><g id="orbits"></g><g id="fog"></g><g id="edges"></g><g id="nodes"></g></g>
  </svg>
</div>
<div id="panel"></div>
<div id="confirm"><div class="box" id="confirmBox"></div></div>
<script>
(() => {
  const PARAMS = new URLSearchParams(location.search);
  const PROJECT = PARAMS.get("project") || "quantum-concepts";
  const DEMO = PARAMS.get("demo");
  const RINGS = [0, 190, 330, 430, 500];   // hyperbolic-flavored compression outward
  const MAXDEPTH = RINGS.length - 1;
  let nodes = [], bySlug = {}, roots = [], focus = null, selected = null;

  const short = t => t.replace(/^OPEN THREAD:\s*/i, "").replace(/\s*\([^)]*\)\s*$/, "");
  const weight = t => (t.match(/\(([^)]*)\)\s*$/) || [])[1] || "";
  const subtree = n => { const out = [n]; n.children.forEach(c => out.push(...subtree(c))); return out; };

  // demo mode: SAME deterministic generator as variants A/B (same seed = identical tree)
  function demoData(count) {
    let s = 42 >>> 0;
    const rnd = () => (s = (s * 1664525 + 1013904223) >>> 0) / 4294967296;
    const pick = a => a[Math.floor(rnd() * a.length)];
    const AREAS = ["the sim", "prose registers", "the GUI", "fate anchors", "the ledger",
      "publishing", "artwork", "Lyra", "the world map", "combat", "the economy",
      "memory systems", "beat design", "the audit", "chapter assembly", "naming",
      "the schedule", "QA rituals", "the spine", "cars"];
    const ASPECTS = ["pacing", "curation", "token cost", "visual design", "calibration",
      "drift", "coverage", "tooling", "doctrine", "automation", "metrics", "workflow",
      "onboarding", "pruning", "search", "export", "grounding", "voice", "continuity", "scale"];
    const FORMS = [t => `should ${t} fan out or stay flat?`, t => `what does ${t} cost at scale?`,
      t => `who owns ${t}?`, t => `is ${t} a stage or an inspector?`,
      t => `when does ${t} graduate to canon?`, t => `does ${t} need its own instrument?`,
      t => `${t}: build now or trigger later?`, t => `how do we measure ${t}?`];
    const WEIGHTS = ["~10 min", "~20 min", "~30 min", "~1 hour", "errand", "deep dive"];
    const out = [];
    const mk = (parent) => {
      const area = pick(AREAS), q = pick(FORMS)(pick(ASPECTS));
      const critical = rnd() < 0.10, state = (!critical && rnd() < 0.22) ? "discussed" : "open";
      const n = { slug: `demo-${out.length}`,
        title: `OPEN THREAD: ${area}: ${q} (${pick(WEIGHTS)})`,
        body: `Synthetic stress-test thread (demo mode, not on the board).${critical ? "\npriority: critical" : ""}\n\nTopic space: ${area}.\nTHE QUESTION: ${q}`,
        author: "demo", created: "2026-07-11", parent, children: [], state, critical };
      out.push(n); return n;
    };
    const rootCount = 8 + Math.floor(rnd() * 6), rootsArr = [];
    for (let i = 0; i < rootCount; i++) rootsArr.push(mk(null));
    for (let i = 0; i < 35 && out.length < count; i++) mk(rootsArr[0].slug);
    for (let c = 1; c <= 2; c++) {
      let p = rootsArr[c];
      for (let d = 0; d < 12 && out.length < count; d++) p = mk(p.slug);
    }
    while (out.length < count) mk(out[Math.floor(rnd() * out.length)].slug);
    return out;
  }

  async function load() {
    let raw;
    if (DEMO) {
      raw = demoData(Math.min(1500, parseInt(DEMO, 10) || 300));
    } else {
      // fetch ALL states (owner round 3): discussed topics stay VISIBLE as progress -
      // only pruned (discarded) topics leave the map
      const r = await fetch(`/api/posts?project=${PROJECT}`);
      const items = (await r.json()).items || [];
      raw = items.filter(p => /^OPEN THREAD/i.test(p.title || ""))
        .filter(p => (p.resolve_kind || "") !== "discarded")
        .map(p => {
          const m = (p.body || "").match(/^parent:\s*([a-z0-9-]+)/mi);
          return { slug: p.slug, title: p.title, body: p.body, author: p.author,
                   created: p.created, parent: m ? m[1] : null, children: [],
                   state: String(p.status || "open") === "open" ? "open" : "discussed",
                   critical: /^priority:\s*critical/mi.test(p.body || "") };
        });
    }
    bySlug = {}; nodes = raw;
    nodes.forEach(n => { n.children = []; n.cur = null; bySlug[n.slug] = n; });
    nodes.forEach(n => { if (n.parent && bySlug[n.parent]) bySlug[n.parent].children.push(n);
                         else n.parent = null; });
    roots = nodes.filter(n => !n.parent);
    // FAMILY HUES (color-by-group, golden-angle spacing per root lineage)
    roots.forEach((root, i) => {
      const hue = Math.round(i * 137.5) % 360;
      (function tint(n) { n.hue = hue; n.children.forEach(tint); })(root);
    });
    focus = null;
    document.getElementById("stat").textContent =
      `${nodes.length} open thread(s), ${roots.length} root(s)${DEMO ? " (demo)" : ""}`;
    relayout(true);
  }

  // ---- radial focus+context layout ----
  // Visible = the focus (or all roots around a virtual core) out to MAXDEPTH rings.
  // Angular span is allocated by visible-leaf weight; deeper content collapses into a
  // dashed halo + count on its frontier node (click/focus to reveal) - the Lamping/Rao
  // focus+context move: detail at the sun, the rest compressed toward the rim.
  let visible = [];
  function visWeight(n, depthLeft) {
    if (depthLeft <= 0 || !n.children.length) return 1;
    return n.children.reduce((s, c) => s + visWeight(c, depthLeft - 1), 0);
  }
  function relayout(instant) {
    visible = [];
    const place = (n, depth, a0, a1) => {
      const mid = (a0 + a1) / 2, r = RINGS[Math.min(depth, MAXDEPTH)];
      const hidden = depth >= MAXDEPTH ? Math.max(0, subtree(n).length - 1)
                                       : 0;
      n.tgt = { x: r * Math.cos(mid), y: r * Math.sin(mid), depth, hidden };
      if (!n.cur) n.cur = instant ? { ...n.tgt } : { x: 0, y: 0 };
      visible.push(n);
      if (depth >= MAXDEPTH) return;
      const kids = n.children, total = kids.reduce((s, c) => s + visWeight(c, MAXDEPTH - depth - 1), 0) || 1;
      let a = a0;
      for (const c of kids) {
        const span = (a1 - a0) * visWeight(c, MAXDEPTH - depth - 1) / total;
        place(c, depth + 1, a, a + span);
        a += span;
      }
    };
    if (focus) {
      focus.tgt = { x: 0, y: 0, depth: 0,
                    hidden: 0 };
      if (!focus.cur) focus.cur = { x: 0, y: 0 };
      visible.push(focus);
      const kids = focus.children,
            total = kids.reduce((s, c) => s + visWeight(c, MAXDEPTH - 1), 0) || 1;
      let a = -Math.PI / 2;
      for (const c of kids) {
        const span = 2 * Math.PI * visWeight(c, MAXDEPTH - 1) / total;
        place(c, 1, a, a + span);
        a += span;
      }
    } else {
      const total = roots.reduce((s, c) => s + visWeight(c, MAXDEPTH - 1), 0) || 1;
      let a = -Math.PI / 2;
      for (const c of roots) {
        const span = 2 * Math.PI * visWeight(c, MAXDEPTH - 1) / total;
        place(c, 1, a, a + span);
        a += span;
      }
    }
    crumbs(); render(); animate();
  }

  // ---- render ----
  const orbitsG = document.getElementById("orbits"), edgesG = document.getElementById("edges"),
        nodesG = document.getElementById("nodes"), fogG = document.getElementById("fog");
  function render() {
    orbitsG.innerHTML = ""; edgesG.innerHTML = ""; nodesG.innerHTML = ""; fogG.innerHTML = "";
    for (let d = 1; d <= MAXDEPTH; d++) {
      const o = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      o.setAttribute("class", "orbit"); o.setAttribute("r", RINGS[d]);
      orbitsG.appendChild(o);
    }
    const inView = new Set(visible.map(n => n.slug));
    for (const n of visible) {
      if (n.tgt.depth <= 1 && n.children.length) {
        // nebula fog behind each family hub (the sun + inner-ring roots)
        const f = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        f.setAttribute("class", "fog"); f.dataset.slug = n.slug;
        f.setAttribute("r", Math.min(260, 90 + subtree(n).length * 3));
        f.setAttribute("fill", "url(#fogGrad)");
        f.style.filter = `hue-rotate(${n.hue || 0}deg)`;
        fogG.appendChild(f);
      }
      if (n.parent && inView.has(n.parent)) {
        const e = document.createElementNS("http://www.w3.org/2000/svg", "path");
        e.setAttribute("class", "edge"); e.dataset.a = n.slug; e.dataset.b = n.parent;
        e.style.stroke = `hsl(${(222 + (n.hue || 0)) % 360}, 65%, 72%)`;
        edgesG.appendChild(e);
      }
      const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
      const isFocus = focus === n, rootlike = !n.parent && !focus;
      g.setAttribute("class", "node" + (isFocus ? " focus" : "") +
                     (rootlike ? " rootlike" : "") + (selected === n ? " selected" : "") +
                     (n.state === "discussed" ? " discussed" : ""));
      g.dataset.slug = n.slug;
      const depth = n.tgt.depth,
            r = isFocus ? 46 : Math.max(10, 30 - depth * 6) + Math.min(10, n.children.length * 1.5);
      const leaf = !n.children.length && !isFocus;
      const hueStyle = (!rootlike && !isFocus) ? `style="filter: hue-rotate(${n.hue || 0}deg)"` : "";
      const body = leaf
        ? `<path class="leafstar" transform="scale(${Math.max(9, r * 0.75) / 8})"
             style="fill: hsl(${(222 + (n.hue || 0)) % 360}, 80%, 88%)"
             d="M0,-8 L2.2,-2.2 L8,0 L2.2,2.2 L0,8 L-2.2,2.2 L-8,0 L-2.2,-2.2 Z"></path>`
        : `<circle class="core" r="${r}" ${hueStyle}></circle>`;
      const beacon = (n.critical && n.state !== "discussed")
        ? `<circle class="beacon" r="${r + 6}">
             <animate attributeName="r" values="${r + 3};${r + 11};${r + 3}" dur="1.8s" repeatCount="indefinite" />
             <animate attributeName="stroke-opacity" values="0.9;0.15;0.9" dur="1.8s" repeatCount="indefinite" />
           </circle>`
        : "";
      const label = depth <= 2 || isFocus ? short(n.title) : "";
      const cut = depth <= 1 ? 46 : 30;
      // label priority for SEMANTIC ZOOM (constant screen size + importance culling)
      n.pri = (isFocus ? 10 : 0) + (rootlike || depth <= 1 ? 5 : 0) + (n.critical ? 4 : 0) +
              Math.min(4, Math.log2(subtree(n).length + 1)) + (n.state === "discussed" ? -2 : 0);
      g.innerHTML = `
        ${n.tgt.hidden ? `<circle class="halo" r="${r + 7}"></circle>` : ""}
        ${beacon}${body}
        ${label ? `<text class="label ${depth >= 2 ? "tiny" : ""}" y="${r + 12}" text-anchor="middle">${label.slice(0, cut)}${label.length > cut ? "..." : ""}</text>` : ""}
        ${n.tgt.hidden ? `<text class="more" y="${-r - 6}" text-anchor="middle">+${n.tgt.hidden} deeper</text>` : ""}`;
      const t = document.createElementNS("http://www.w3.org/2000/svg", "title");
      t.textContent = short(n.title);
      g.appendChild(t);
      g.addEventListener("click", ev => { ev.stopPropagation(); select(n); });
      g.addEventListener("dblclick", ev => { ev.stopPropagation(); setFocus(n); });
      nodesG.appendChild(g);
    }
    position();
    scheduleLabels();
  }
  function position() {
    for (const g of nodesG.children) { const n = bySlug[g.dataset.slug];
      g.setAttribute("transform", `translate(${n.cur.x},${n.cur.y})`); }
    for (const f of fogG.children) { const n = bySlug[f.dataset.slug];
      if (n) { f.setAttribute("cx", n.cur.x); f.setAttribute("cy", n.cur.y); } }
    // curved edges: a gentle perpendicular bow reads organic instead of wiry
    for (const e of edgesG.children) { const a = bySlug[e.dataset.a], b = bySlug[e.dataset.b];
      const dx = b.cur.x - a.cur.x, dy = b.cur.y - a.cur.y;
      const mx = (a.cur.x + b.cur.x) / 2 + dy * 0.12, my = (a.cur.y + b.cur.y) / 2 - dx * 0.12;
      e.setAttribute("d", `M ${a.cur.x} ${a.cur.y} Q ${mx} ${my} ${b.cur.x} ${b.cur.y}`); }
  }
  let animId = null;
  function animate() {
    cancelAnimationFrame(animId);
    const step = () => {
      let moving = false;
      for (const n of visible) {
        const dx = n.tgt.x - n.cur.x, dy = n.tgt.y - n.cur.y;
        if (Math.abs(dx) + Math.abs(dy) > 0.5) { moving = true;
          n.cur.x += dx * 0.16; n.cur.y += dy * 0.16; }
        else { n.cur.x = n.tgt.x; n.cur.y = n.tgt.y; }
      }
      position();
      if (moving) animId = requestAnimationFrame(step);
    };
    animId = requestAnimationFrame(step);
  }

  function setFocus(n) {
    focus = n; selected = null; panel.className = "";
    relayout(false);
  }
  function crumbs() {
    const el = document.getElementById("crumbs");
    const path = [];
    let p = focus;
    while (p) { path.unshift(p); p = p.parent ? bySlug[p.parent] : null; }
    let html = `<span data-c="core">Galactic Core</span>`;
    path.forEach((n, i) => {
      const last = i === path.length - 1;
      html += ` <span class="sep">&gt;</span> ` +
        (last ? `<span class="here">${short(n.title).slice(0, 34)}</span>`
              : `<span data-c="${n.slug}">${short(n.title).slice(0, 26)}</span>`);
    });
    el.innerHTML = html;
    el.querySelectorAll("span[data-c]").forEach(s => s.onclick = () =>
      setFocus(s.dataset.c === "core" ? null : bySlug[s.dataset.c]));
  }

  // ---- pan/zoom (cursor-anchored) ----
  const view = document.getElementById("view"), stage = document.getElementById("stage");
  let tx = 0, ty = 0, scale = 1;
  // SEMANTIC ZOOM: constant-screen-size labels + importance culling (see variant A)
  let labelRaf = null;
  function updateLabels() {
    labelRaf = null;
    const budget = scale >= 0.9 ? Infinity : scale >= 0.55 ? 40 : 16;
    let allowed = null;
    if (budget !== Infinity) {
      allowed = new Set(visible.slice().sort((a, b) => (b.pri || 0) - (a.pri || 0))
                               .slice(0, budget).map(n => n.slug));
    }
    // THE CONTRACT: any label we show is READABLE (constant screen size, no world-unit cap)
    // or it is not shown at all. Inline styles, not attributes - the stylesheet's font-size/
    // stroke-width rules override SVG presentation attributes (the owner-caught bug: culling
    // worked, sizing silently never applied).
    const fs = 12 / scale, fsTiny = 10.5 / scale, halo = 3.5 / scale;
    for (const g of nodesG.children) {
      const n = bySlug[g.dataset.slug]; if (!n) continue;
      const label = g.querySelector("text.label"), more = g.querySelector("text.more");
      if (label) {
        const show = !allowed || allowed.has(n.slug);
        label.style.display = show ? "" : "none";
        if (show) {
          label.style.fontSize = (label.classList.contains("tiny") ? fsTiny : fs) + "px";
          label.style.strokeWidth = halo + "px";
          label.style.fontWeight = scale < 0.55 ? "600" : "";
        }
      }
      if (more) {
        more.style.fontSize = Math.max(9 / scale, 9) + "px";
        more.style.strokeWidth = halo + "px";
      }
    }
  }
  const scheduleLabels = () => { if (!labelRaf) labelRaf = requestAnimationFrame(updateLabels); };
  const apply = () => { view.setAttribute("transform", `translate(${tx},${ty}) scale(${scale})`);
                        scheduleLabels(); };
  function center() { const r = stage.getBoundingClientRect();
    tx = r.width / 2; ty = r.height / 2; apply(); }
  stage.addEventListener("mousedown", ev => {
    if (ev.target.closest(".node")) return;
    stage.classList.add("dragging");
    const sx = ev.clientX - tx, sy = ev.clientY - ty;
    const mv = e => { tx = e.clientX - sx; ty = e.clientY - sy; apply(); };
    const up = () => { stage.classList.remove("dragging");
      removeEventListener("mousemove", mv); removeEventListener("mouseup", up); };
    addEventListener("mousemove", mv); addEventListener("mouseup", up);
  });
  stage.addEventListener("wheel", ev => { ev.preventDefault();
    const rect = stage.getBoundingClientRect();
    const mx = ev.clientX - rect.left, my = ev.clientY - rect.top;
    const next = Math.max(0.3, Math.min(3, scale * (ev.deltaY < 0 ? 1.12 : 0.9)));
    tx = mx - (mx - tx) * (next / scale);
    ty = my - (my - ty) * (next / scale);
    scale = next; apply(); }, { passive: false });

  // ---- detail panel + state actions ----
  const HDRS = { "Content-Type": "application/json", "X-Requested-By": "thread-tree" };
  const panel = document.getElementById("panel");
  function select(n) {
    selected = n; render();
    const kids = subtree(n).length - 1;
    panel.className = "open";
    const stateChip = n.state === "discussed" ? " | DISCUSSED" : (n.critical ? " | CRITICAL" : "");
    panel.innerHTML = `<h2>${short(n.title)}</h2>
      <div class="meta">${weight(n.title) || "no time-weight"} | by ${n.author} | ${String(n.created).slice(0, 10)}
        | ${n.children.length} child(ren), ${kids} descendant(s)${stateChip}<br/>slug: ${n.slug}</div>
      <div class="body"></div>
      <button class="focusbtn">Focus here</button>
      ${n.state === "discussed"
        ? `<button class="reopen">Reopen topic</button>`
        : `<button class="discuss">Mark discussed</button>`}
      <button class="prune">Prune this branch</button>
      <button class="close">Close</button>`;
    panel.querySelector(".body").textContent =
      (n.body || "").replace(/^parent:.*$/mi, "").replace(/^priority:.*$/mi, "").trim();
    panel.querySelector(".close").onclick = () => { panel.className = ""; selected = null; render(); };
    panel.querySelector(".focusbtn").onclick = () => setFocus(n);
    panel.querySelector(".prune").onclick = () => confirmPrune(n);
    const reopenBtn = panel.querySelector(".reopen");
    if (reopenBtn) reopenBtn.onclick = async () => {
      if (!DEMO) await fetch("/api/reopen", { method: "POST", headers: HDRS,
        body: JSON.stringify({ slug: n.slug, author: "Murakumo" }) });
      n.state = "open"; panel.className = ""; selected = null; render();
    };
    const discussBtn = panel.querySelector(".discuss");
    if (discussBtn) discussBtn.onclick = async () => {
      if (!DEMO) await fetch("/api/post/resolve", { method: "POST", headers: HDRS,
        body: JSON.stringify({ slug: n.slug, author: "Murakumo", kind: "completed",
                               note: "discussed - marked via the thread tree" }) });
      n.state = "discussed"; panel.className = ""; selected = null; render();
    };
  }
  function confirmPrune(n) {
    const all = subtree(n), box = document.getElementById("confirmBox"),
          modal = document.getElementById("confirm");
    box.innerHTML = `<h3>Prune "${short(n.title).slice(0, 60)}"?</h3>
      <p>This resolves <b>${all.length} thread(s)</b> (this node + ${all.length - 1} descendant(s)).
      Reversible: yes - any thread can be reopened on the board.</p>
      <button class="go" style="border:1px solid var(--danger);color:var(--danger);background:none;border-radius:6px;padding:6px 14px;cursor:pointer;margin-right:8px;">Prune ${all.length}</button>
      <button class="no" style="border:1px solid var(--line);color:var(--ink);background:none;border-radius:6px;padding:6px 14px;cursor:pointer;">Cancel</button>`;
    modal.className = "open";
    box.querySelector(".no").onclick = () => modal.className = "";
    box.querySelector(".go").onclick = async () => {
      if (DEMO) {
        const gone = new Set(all.map(t => t.slug));
        if (focus && gone.has(focus.slug)) focus = null;
        nodes = nodes.filter(t => !gone.has(t.slug));
        nodes.forEach(t => t.children = t.children.filter(c => !gone.has(c.slug)));
        roots = nodes.filter(t => !t.parent);
        modal.className = ""; panel.className = ""; selected = null;
        document.getElementById("stat").textContent = `${nodes.length} open thread(s) (demo)`;
        relayout(false);
        return;
      }
      for (const t of all) await fetch("/api/post/resolve", {
        method: "POST", headers: HDRS,
        body: JSON.stringify({ slug: t.slug, author: "Murakumo", kind: "discarded",
                               note: "pruned from the thread tree by the owner" }) });
      modal.className = ""; panel.className = ""; selected = null; load();
    };
  }

  // starfield backdrop
  function paintStars() {
    const c = document.getElementById("stars"), r = stage.getBoundingClientRect();
    c.width = r.width; c.height = r.height;
    const ctx = c.getContext("2d");
    let s = 7 >>> 0; const rnd = () => (s = (s * 1664525 + 1013904223) >>> 0) / 4294967296;
    for (let i = 0; i < 240; i++) {
      const x = rnd() * c.width, y = rnd() * c.height, big = rnd() > 0.94;
      ctx.globalAlpha = big ? 0.8 : 0.15 + rnd() * 0.35;
      ctx.fillStyle = big ? "#cfe0ff" : "#8fa5d8";
      ctx.beginPath(); ctx.arc(x, y, big ? 1.4 : 0.7, 0, 7); ctx.fill();
    }
    for (const t of stage.querySelectorAll(".twinkle")) t.remove();
    for (let i = 0; i < 14; i++) {
      const t = document.createElement("div");
      t.className = "twinkle";
      t.style.left = (rnd() * 100) + "%"; t.style.top = (rnd() * 100) + "%";
      t.style.animationDelay = (rnd() * 3.2) + "s";
      stage.appendChild(t);
    }
  }
  addEventListener("resize", paintStars);

  paintStars(); center(); load();
})();
</script>
</body>
</html>
